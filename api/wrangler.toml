name = "star-judge-api"
main = "src/index.ts"
compatibility_date = "2025-04-01"
compatibility_flags = ["nodejs_compat"]

[[d1_databases]]
binding = "DB"
database_name = "star-judge-db"
database_id = "0593696f-48da-409c-b203-420d71f30b2b"

[vars]
ENVIRONMENT = "production"

# BGG_API_KEY stored as a secret: wrangler secret put BGG_API_KEY

[env.local.vars]
ENVIRONMENT = "development"

[[env.local.d1_databases]]
binding = "DB"
database_name = "star-judge-db"
database_id = "00000000-0000-0000-0000-000000000000"
