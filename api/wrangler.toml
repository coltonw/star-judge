name = "star-judge-api"
main = "src/index.ts"
compatibility_date = "2025-04-01"
compatibility_flags = ["nodejs_compat"]

[[d1_databases]]
binding = "DB"
database_name = "star-judge-db"
database_id = "00000000-0000-0000-0000-000000000000"

[vars]
ENVIRONMENT = "development"

# BGG_API_KEY stored as a secret: wrangler secret put BGG_API_KEY
# CLOUDFLARE_ACCESS_AUD stored as a secret: wrangler secret put CLOUDFLARE_ACCESS_AUD
