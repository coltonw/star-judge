name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Lint & type-check ────────────────────────────────────────────────────────
  check:
    name: Lint & type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # ── Tests ──────────────────────────────────────────────────────────────
      - name: Test (api)
        run: pnpm --filter api test

      - name: Test (web)
        run: pnpm --filter web test

      # ── Lint + format check (no writes) ────────────────────────────────────
      - name: Biome CI
        run: pnpm run ci

      # ── TypeScript / Svelte type-check ─────────────────────────────────────
      - name: svelte-check (web)
        run: pnpm --filter web check

      - name: tsc (api)
        run: cd api && npx tsc --noEmit

  # ── Deploy Worker ────────────────────────────────────────────────────────────
  # Cloudflare Pages handles the SvelteKit frontend automatically on push.
  # The Hono Worker (api/) must be deployed separately via Wrangler.
  deploy-api:
    name: Deploy API Worker
    environment: prod
    runs-on: ubuntu-latest
    needs: check
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Deploy to Cloudflare Workers
        run: pnpm --filter api run deploy --env ""
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
