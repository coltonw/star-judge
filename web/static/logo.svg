<svg xmlns="http://www.w3.org/2000/svg" viewBox="-8 0 236 172" fill="none">
  <defs>
    <!--
      Radial gradient for the shining star.
      Focal point shifted up-left to match the Gemini reference glow.
    -->
    <radialGradient id="star-glow" cx="44%" cy="28%" r="65%">
      <stop offset="0%"   stop-color="#ffffff"/>
      <stop offset="18%"  stop-color="#d4fdf9"/>
      <stop offset="55%"  stop-color="#2dd4bf"/>
      <stop offset="100%" stop-color="#0a7a6e"/>
    </radialGradient>
  </defs>

  <!-- ═══════════════════════════════════════════════════════
       SPARKLE RAYS — drawn first so star polygon covers them
       in the interior; only the extensions beyond the star show.
       ═══════════════════════════════════════════════════════ -->
  <g stroke="#7ef8ef" stroke-linecap="round">
    <!-- 5 primary rays at star-point angles -->
    <line x1="15" y1="110" x2="15"  y2="78"  stroke-width="1.8"/>
    <line x1="15" y1="110" x2="44"  y2="100" stroke-width="1.8"/>
    <line x1="15" y1="110" x2="30"  y2="131" stroke-width="1.4"/>
    <line x1="15" y1="110" x2="0"   y2="131" stroke-width="1.4"/>
    <line x1="15" y1="110" x2="-14" y2="100" stroke-width="1.8"/>
    <!-- 4 secondary rays between points -->
    <line x1="15" y1="110" x2="27"  y2="90"  stroke-width="1.2"/>
    <line x1="15" y1="110" x2="36"  y2="118" stroke-width="1.0"/>
    <line x1="15" y1="110" x2="-6"  y2="118" stroke-width="1.0"/>
    <line x1="15" y1="110" x2="3"   y2="90"  stroke-width="1.2"/>
  </g>

  <!-- 4-pointed sparkle crosses at ray tips -->
  <g stroke="#c4faf6" stroke-linecap="round">
    <!-- Top — largest -->
    <g transform="translate(15,74)">
      <line x1="0"  y1="-7" x2="0"  y2="7"  stroke-width="1.8"/>
      <line x1="-7" y1="0"  x2="7"  y2="0"  stroke-width="1.8"/>
      <line x1="-4" y1="-4" x2="4"  y2="4"  stroke-width="1.0"/>
      <line x1="4"  y1="-4" x2="-4" y2="4"  stroke-width="1.0"/>
    </g>
    <!-- Upper-right -->
    <g transform="translate(46,97)">
      <line x1="0"  y1="-5" x2="0"  y2="5"  stroke-width="1.4"/>
      <line x1="-5" y1="0"  x2="5"  y2="0"  stroke-width="1.4"/>
      <line x1="-3" y1="-3" x2="3"  y2="3"  stroke-width="0.9"/>
      <line x1="3"  y1="-3" x2="-3" y2="3"  stroke-width="0.9"/>
    </g>
    <!-- Upper-left -->
    <g transform="translate(-13,97)">
      <line x1="0"  y1="-5" x2="0"  y2="5"  stroke-width="1.4"/>
      <line x1="-5" y1="0"  x2="5"  y2="0"  stroke-width="1.4"/>
      <line x1="-3" y1="-3" x2="3"  y2="3"  stroke-width="0.9"/>
      <line x1="3"  y1="-3" x2="-3" y2="3"  stroke-width="0.9"/>
    </g>
    <!-- Small secondary cross, upper-right -->
    <g transform="translate(28,87)">
      <line x1="0"  y1="-4" x2="0"  y2="4"  stroke-width="1.2"/>
      <line x1="-4" y1="0"  x2="4"  y2="0"  stroke-width="1.2"/>
    </g>
  </g>

  <!-- ═══════════════════════════════════════════════════════
       SCALE STRUCTURE  (#4a5a82)
       Beam from (15,50)→(205,28) passes through pivot at (110,39).
       ═══════════════════════════════════════════════════════ -->

  <!-- Base pedestal: wide bottom plate + narrower middle column -->
  <rect x="74"  y="150" width="72" height="11" rx="4" fill="#4a5a82"/>
  <rect x="90"  y="139" width="40" height="13" rx="2" fill="#4a5a82"/>

  <!-- Vertical post -->
  <rect x="103" y="39" width="14" height="102" fill="#4a5a82"/>

  <!-- Pivot knob (circular cap at top of post, beam pivots here) -->
  <circle cx="110" cy="39" r="11" fill="#4a5a82"/>

  <!-- Beam — tilted so left end hangs lower -->
  <line x1="15" y1="50" x2="205" y2="28"
        stroke="#4a5a82" stroke-width="10" stroke-linecap="round"/>

  <!-- Round connector knobs at each beam end (chain attachment points) -->
  <circle cx="15"  cy="50" r="6.5" fill="#4a5a82"/>
  <circle cx="205" cy="28" r="6.5" fill="#4a5a82"/>

  <!-- Left chain  (7 links, alternating H/V ellipses) -->
  <g stroke="#4a5a82" stroke-width="2.3" fill="none">
    <ellipse cx="15" cy="57"  rx="5" ry="3"/>
    <ellipse cx="15" cy="64"  rx="3" ry="5"/>
    <ellipse cx="15" cy="71"  rx="5" ry="3"/>
    <ellipse cx="15" cy="78"  rx="3" ry="5"/>
    <ellipse cx="15" cy="85"  rx="5" ry="3"/>
    <ellipse cx="15" cy="92"  rx="3" ry="5"/>
    <ellipse cx="15" cy="99"  rx="5" ry="3"/>
  </g>

  <!-- Right chain (6 links) -->
  <g stroke="#4a5a82" stroke-width="2.3" fill="none">
    <ellipse cx="205" cy="35"  rx="5" ry="3"/>
    <ellipse cx="205" cy="42"  rx="3" ry="5"/>
    <ellipse cx="205" cy="49"  rx="5" ry="3"/>
    <ellipse cx="205" cy="56"  rx="3" ry="5"/>
    <ellipse cx="205" cy="63"  rx="5" ry="3"/>
    <ellipse cx="205" cy="70"  rx="3" ry="5"/>
  </g>

  <!-- Left pan bowl — arc, lower (heavier side) -->
  <path d="M -3,102 Q 15,119 33,102"
        stroke="#4a5a82" stroke-width="5.5" stroke-linecap="round" fill="none"/>

  <!-- Right pan bowl — arc, higher (lighter side) -->
  <path d="M 187,74 Q 205,91 223,74"
        stroke="#4a5a82" stroke-width="5.5" stroke-linecap="round" fill="none"/>

  <!-- ═══════════════════════════════════════════════════════
       STAR IN LEFT PAN
       Center (15, 110), outer R=15, inner r=6
       Points: 5 outer interleaved with 5 inner (clockwise from top)
       ═══════════════════════════════════════════════════════ -->

  <!-- Soft ambient glow halo behind the star -->
  <circle cx="15" cy="110" r="22" fill="#2dd4bf" opacity="0.13"/>

  <polygon
    points="
      15,95
      18.5,105.2
      29.3,105.4
      20.7,111.9
      23.8,122.1
      15,116
      6.2,122.1
      9.3,111.9
      0.7,105.4
      11.5,105.2
    "
    fill="url(#star-glow)"
  />
</svg>
